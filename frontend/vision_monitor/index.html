<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G1 Vision Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071323;
      --panel: #0d2036;
      --line: #24415f;
      --text: #e8f1ff;
      --muted: #8fb0d1;
      --ok: #43d17d;
      --warn: #f0b94b;
      --bad: #ff5c78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #08192d;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid #e7b84a;
      border-radius: 8px;
      color: #e7b84a;
      font-weight: 800;
      font-size: 12px;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 12px;
      color: var(--muted);
    }
    .pill {
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0a1a2f;
      color: var(--muted);
    }
    .pill.ok { color: var(--ok); border-color: rgba(67, 209, 125, .35); }
    .pill.warn { color: var(--warn); border-color: rgba(240, 185, 75, .4); }
    .pill.bad { color: var(--bad); border-color: rgba(255, 92, 120, .42); }
    main {
      height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--line);
    }
    section {
      min-width: 0;
      background: var(--panel);
      display: grid;
      grid-template-rows: 42px 1fr 56px;
    }
    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }
    .panel-title strong {
      color: var(--text);
      font-size: 15px;
    }
    .image-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      background: #030914;
      position: relative;
      overflow: hidden;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      image-rendering: auto;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 18px;
    }
    .meta {
      padding: 9px 14px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    @media (max-width: 900px) {
      header {
        height: auto;
        min-height: 56px;
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
      }
      main {
        height: auto;
        min-height: calc(100vh - 86px);
        grid-template-columns: 1fr;
      }
      section { min-height: 48vh; }
      .status { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">ZT</div>
      <div>
        <div class="sub">Perception monitor</div>
        <h1>G1 视觉流监测</h1>
      </div>
    </div>
    <div class="status">
      <span id="runState" class="pill warn">connecting</span>
      <span id="source" class="pill">source -</span>
      <span id="frames" class="pill">frames 0</span>
      <span id="age" class="pill">age -</span>
    </div>
  </header>
  <main>
    <section>
      <div class="panel-title">
        <strong>RGB</strong>
        <span id="rgbTitle">waiting</span>
      </div>
      <div class="image-wrap">
        <img id="rgbImage" alt="G1 RGB stream" />
        <div id="rgbEmpty" class="empty">等待 RGB 帧</div>
      </div>
      <div id="rgbMeta" class="meta">-</div>
    </section>
    <section>
      <div class="panel-title">
        <strong>Depth</strong>
        <span id="depthTitle">waiting</span>
      </div>
      <div class="image-wrap">
        <img id="depthImage" alt="G1 depth stream" />
        <div id="depthEmpty" class="empty">等待 Depth 帧</div>
      </div>
      <div id="depthMeta" class="meta">-</div>
    </section>
  </main>
  <script>
    const state = {
      rgb: null,
      depth: null,
      errors: 0,
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function classifyAge(ms) {
      if (ms == null) return "warn";
      if (ms < 1500) return "ok";
      if (ms < 5000) return "warn";
      return "bad";
    }

    function updateImage(kind, summary) {
      if (!summary || summary.frame_id == null) return;
      if (state[kind] === summary.frame_id) return;
      state[kind] = summary.frame_id;
      const image = byId(kind + "Image");
      const empty = byId(kind + "Empty");
      const title = byId(kind + "Title");
      const meta = byId(kind + "Meta");
      image.onload = () => {
        image.style.display = "block";
        empty.style.display = "none";
      };
      image.src = `/api/perception/vision/latest/${kind}?frame=${summary.frame_id}&t=${Date.now()}`;
      title.textContent = `frame ${summary.frame_id}`;
      meta.textContent = `${summary.source} / ${summary.bytes} bytes / ${summary.chunks_total} chunks / assembly ${summary.assembly_latency_ms} ms`;
    }

    async function tick() {
      try {
        const response = await fetch(`/api/perception/vision/status?t=${Date.now()}`, { cache: "no-store" });
        const status = await response.json();
        const latest = status.latest || {};
        const ageMs = status.last_frame_age_ms;
        const runState = byId("runState");
        runState.textContent = status.running ? "receiver online" : "receiver offline";
        runState.className = "pill " + (status.running ? classifyAge(ageMs) : "bad");

        const source = latest.rgb?.source || latest.depth?.source || "-";
        byId("source").textContent = `source ${source}`;
        byId("frames").textContent = `frames ${status.frames_completed || 0}`;
        const age = byId("age");
        age.textContent = ageMs == null ? "age -" : `age ${Math.round(ageMs)} ms`;
        age.className = "pill " + classifyAge(ageMs);

        updateImage("rgb", latest.rgb);
        updateImage("depth", latest.depth);
        state.errors = 0;
      } catch (error) {
        state.errors += 1;
        const runState = byId("runState");
        runState.textContent = `api error ${state.errors}`;
        runState.className = "pill bad";
      }
    }

    tick();
    setInterval(tick, 180);
  </script>
</body>
</html>
