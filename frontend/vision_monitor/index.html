<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G1 感知流监测</title>
  <style>
    body{margin:0;background:#071323;color:#e8f1ff;font-family:Arial,"Microsoft YaHei",sans-serif}
    header{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 14px;background:#08192d;border-bottom:1px solid #24415f}
    h1{font-size:18px;margin:0}.muted{color:#8fb0d1;font-size:12px}
    .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{border:1px solid #24415f;border-radius:999px;padding:4px 9px;color:#8fb0d1;background:#0a1a2f}
    .ok{color:#43d17d;border-color:#2e8b56}.bad{color:#ff5c78;border-color:#8b2e45}.warn{color:#f0b94b;border-color:#8b7130}
    input{background:#06101e;color:#e8f1ff;border:1px solid #24415f;border-radius:6px;padding:7px 8px}
    button{background:#123456;color:#e8f1ff;border:1px solid #3f6b96;border-radius:6px;padding:7px 10px;cursor:pointer}
    button:hover{border-color:#e7b84a}
    main{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#24415f;height:calc(100vh - 62px)}
    section{background:#0d2036;min-width:0;display:flex;flex-direction:column}
    .title{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border-bottom:1px solid #24415f}
    .viewer{flex:1;min-height:0;display:grid;place-items:center;background:#030914;overflow:hidden}
    img{max-width:100%;max-height:100%;object-fit:contain;display:none}
    .empty{color:#8fb0d1}.meta{padding:8px 12px;border-top:1px solid #24415f;color:#8fb0d1;font:12px Consolas,monospace;white-space:pre-wrap}
    .list{padding:10px 12px;overflow:auto;line-height:1.55}.item{border-bottom:1px solid #24415f;padding:8px 0}
    @media(max-width:900px){header{align-items:flex-start;flex-direction:column}main{height:auto;grid-template-columns:1fr}section{min-height:42vh}}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>G1 感知流监测</h1>
      <div class="muted">图像 / 原始声音 / ASR 文本 / 网关控制</div>
    </div>
    <div class="bar">
      <span id="hubState" class="pill warn">hub checking</span>
      <input id="robotUrl" size="28" value="http://192.168.1.172:8731" title="机器人 Ubuntu 网关地址" />
      <input id="ttl" size="5" value="600" title="持续秒数" />
      <button onclick="robotCmd('video','start')">开图像</button>
      <button onclick="robotCmd('video','stop')">关图像</button>
      <button onclick="robotCmd('audio','mic_start')">开声音</button>
      <button onclick="robotCmd('audio','mic_stop')">关声音</button>
      <span id="cmdState" class="pill">ready</span>
      <span id="cfgState" class="pill">config -</span>
    </div>
  </header>

  <main>
    <section>
      <div class="title"><strong>RGB</strong><span id="rgbTitle" class="muted">waiting</span></div>
      <div class="viewer"><img id="rgbImg" /><div id="rgbEmpty" class="empty">等待 RGB 帧</div></div>
      <div id="rgbMeta" class="meta">-</div>
    </section>
    <section>
      <div class="title"><strong>Depth</strong><span id="depthTitle" class="muted">waiting</span></div>
      <div class="viewer"><img id="depthImg" /><div id="depthEmpty" class="empty">等待 Depth 帧</div></div>
      <div id="depthMeta" class="meta">-</div>
    </section>
    <section>
      <div class="title"><strong>原始声音</strong><span id="audioTitle" class="muted">waiting</span></div>
      <div id="audioBox" class="list"></div>
      <div class="meta"><a style="color:#e7b84a" href="/api/perception/audio/raw?seconds=5" download="g1_audio_5s.raw">下载最近 5 秒 raw</a></div>
    </section>
    <section>
      <div class="title"><strong>ASR 文本</strong><span id="asrTitle" class="muted">waiting</span></div>
      <div id="asrBox" class="list"></div>
      <div class="meta">POST /api/perception/asr/text</div>
    </section>
  </main>

  <script>
    const seen = {rgb:null, depth:null};
    const linkConfig = {robot_host:{gateway_url:"http://192.168.1.172:8731"}, central_receive:{vision_udp_port:5005,audio_tcp_port:6000}, defaults:{ttl_sec:600}};
    const $ = id => document.getElementById(id);
    const clsAge = ms => ms == null ? "warn" : ms < 2000 ? "ok" : ms < 8000 ? "warn" : "bad";
    const json = async url => (await fetch(url,{cache:"no-store"})).json();

    async function loadConfig(){
      try{
        const c=await json(`/api/robot-link/config?t=${Date.now()}`);
        Object.assign(linkConfig.robot_host, c.robot_host||{});
        Object.assign(linkConfig.central_receive, c.central_receive||{});
        Object.assign(linkConfig.defaults, c.defaults||{});
        $("robotUrl").value=linkConfig.robot_host.gateway_url || $("robotUrl").value;
        $("ttl").value=linkConfig.defaults.ttl_sec || $("ttl").value;
        $("cfgState").textContent=`robot ${linkConfig.robot_host.gateway_port} / img ${linkConfig.central_receive.vision_udp_port} / audio ${linkConfig.central_receive.audio_tcp_port}`;
        $("cfgState").className="pill ok";
      }catch(e){
        $("cfgState").textContent="config fallback";
        $("cfgState").className="pill warn";
      }
    }

    function showImg(kind, s){
      if(!s || s.frame_id == null) return;
      if(seen[kind] === s.frame_id) return;
      seen[kind] = s.frame_id;
      const img=$(kind+"Img"), empty=$(kind+"Empty");
      img.onload=()=>{img.style.display="block"; empty.style.display="none";};
      img.src=`/api/perception/vision/latest/${kind}?frame=${s.frame_id}&t=${Date.now()}`;
      $(kind+"Title").textContent=`frame ${s.frame_id}`;
      $(kind+"Meta").textContent=`${s.source||"-"} / ${s.bytes||0} bytes / ${s.chunks_total||0} chunks / ${s.assembly_latency_ms||"-"} ms`;
    }

    async function pollVision(){
      try{
        const s=await json(`/api/perception/vision/status?t=${Date.now()}`);
        $("hubState").textContent=s.running?`hub online / frames ${s.frames_completed||0}`:"hub offline";
        $("hubState").className="pill "+(s.running?clsAge(s.last_frame_age_ms):"bad");
        showImg("rgb", s.latest && s.latest.rgb);
        showImg("depth", s.latest && s.latest.depth);
      }catch(e){$("hubState").textContent="hub api error";$("hubState").className="pill bad";}
    }

    async function pollAudio(){
      try{
        const a=await json(`/api/perception/audio/status?t=${Date.now()}`);
        $("audioTitle").textContent=a.last_chunk_at?`last ${a.last_chunk_at}`:"no chunks";
        $("audioBox").innerHTML=`<div class="item">running: ${a.running}</div>
          <div class="item">connections: ${a.connections}</div>
          <div class="item">chunks_received: ${a.chunks_received}</div>
          <div class="item">bytes_received: ${a.bytes_received}</div>
          <div class="item">queue: ${a.queue_chunks} chunks / ${a.queue_bytes} bytes</div>
          <div class="item">last_age_ms: ${a.last_chunk_age_ms ?? "-"}</div>`;
      }catch(e){$("audioBox").textContent="audio api error";}
    }

    async function pollAsr(){
      try{
        const h=await json(`/api/perception/asr/history?limit=8&t=${Date.now()}`);
        $("asrTitle").textContent=`total ${h.total||0}`;
        const rows=(h.records||[]).slice().reverse().map(r=>`<div class="item"><b>${r.text||""}</b><br><span class="muted">${r.start_time||"-"} -> ${r.end_time||"-"} / recv ${r.received_at||"-"}</span></div>`);
        $("asrBox").innerHTML=rows.join("") || `<div class="empty">暂无 ASR 文本</div>`;
      }catch(e){$("asrBox").textContent="asr api error";}
    }

    async function robotCmd(domain, action){
      const ttl=Number($("ttl").value||600);
      const params = action.includes("start") ? {ttl_sec:ttl} : {};
      if(domain==="video" && action==="start"){
        params.vision_udp_port=linkConfig.central_receive.vision_udp_port;
        params.dst_port=linkConfig.central_receive.vision_udp_port;
        params.hub_ip=linkConfig.central_receive.host_ip;
      }
      if(domain==="audio" && action==="mic_start"){
        params.audio_tcp_port=linkConfig.central_receive.audio_tcp_port;
        params.dst_port=linkConfig.central_receive.audio_tcp_port;
        params.hub_ip=linkConfig.central_receive.host_ip;
      }
      $("cmdState").textContent="sending"; $("cmdState").className="pill warn";
      try{
        const body={robot_url:$("robotUrl").value,protocol:"tongyu.robot.unified.v1",message_id:"web_"+Date.now(),target_id:"unitree_g1",target_type:"robot",ack:true,command:{domain,action,params}};
        const r=await fetch("/api/robot-host/command",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        const data=await r.json();
        $("cmdState").textContent=(data.status||"done")+" / "+(data.route||`${domain}.${action}`);
        $("cmdState").className="pill "+(r.ok?"ok":"bad");
      }catch(e){$("cmdState").textContent="send failed";$("cmdState").className="pill bad";}
    }

    loadConfig();
    pollVision(); pollAudio(); pollAsr();
    setInterval(pollVision,500);
    setInterval(pollAudio,1000);
    setInterval(pollAsr,1000);
  </script>
</body>
</html>
